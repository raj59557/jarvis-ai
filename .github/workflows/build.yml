name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install tools
      run: |
        pip install buildozer
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk

    - name: Build APK
      run: buildozer android debug
